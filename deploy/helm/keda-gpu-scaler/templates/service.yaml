apiVersion: v1
kind: Service
metadata:
  name: {{ include "keda-gpu-scaler.fullname" . }}
  labels:
    {{- include "keda-gpu-scaler.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: grpc
      protocol: TCP
      name: grpc
    - port: {{ .Values.metrics.port }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "keda-gpu-scaler.selectorLabels" . | nindent 4 }}
