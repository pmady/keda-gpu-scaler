apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "keda-gpu-scaler.fullname" . }}
  labels:
    {{- include "keda-gpu-scaler.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "keda-gpu-scaler.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "keda-gpu-scaler.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "keda-gpu-scaler.serviceAccountName" . }}
      {{- if .Values.runtimeClassName }}
      runtimeClassName: {{ .Values.runtimeClassName }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --port={{ .Values.grpc.port }}
            - --log-level={{ .Values.logLevel }}
          ports:
            - name: grpc
              containerPort: {{ .Values.grpc.port }}
              protocol: TCP
          livenessProbe:
            grpc:
              port: {{ .Values.grpc.port }}
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            grpc:
              port: {{ .Values.grpc.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
